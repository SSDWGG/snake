# HTTP server — 处理 ACME 验证和重定向到 HTTPS
server {
    listen 80;
    server_name snake.ssdwgg.site snake.aiwgg.cn;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        allow all;
        root /www/wwwroot/ryw-yun-project/snake;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name snake.ssdwgg.site snake.aiwgg.cn;

    root /www/wwwroot/ryw-yun-project/snake;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/snake.ssdwgg.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snake.ssdwgg.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.(mp4|webm|ogg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location ~ /\. {
        deny all;
    }

    access_log /www/wwwlogs/snake.access.log;
    error_log /www/wwwlogs/snake.error.log;
}
