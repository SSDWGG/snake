server {
    listen 80;
    server_name snake.ssdwgg.site snake.aiwgg.cn;

    root /www/wwwroot/ryw-yun-project/snake;
    index index.html;

    # Let's Encrypt ACME challenge — 必须在 deny all 之前
    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        allow all;
        root /www/wwwroot/ryw-yun-project/snake;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.(mp4|webm|ogg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location ~ /\. {
        deny all;
    }

    access_log /www/wwwlogs/snake.access.log;
    error_log /www/wwwlogs/snake.error.log;
}
